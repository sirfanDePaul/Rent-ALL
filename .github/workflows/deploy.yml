name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_API_URL: https://rentall-ylb9.onrender.com
        run: npm run build

      - name: Show built bundle filename
        run: ls frontend/build/static/js/main.*.js

      - name: Zip build output
        run: |
          cd frontend/build
          zip -r ../../build.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETKEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Stop any in-progress Amplify job
        run: |
          STUCK_JOB=$(aws amplify list-jobs \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name ${{ secrets.AMPLIFY_BRANCH }} \
            --max-results 1 \
            | jq -r '.jobSummaries[0] | select(.status == "RUNNING" or .status == "PENDING") | .jobId')
          if [ -n "$STUCK_JOB" ]; then
            echo "Stopping job $STUCK_JOB"
            aws amplify stop-job \
              --app-id ${{ secrets.AMPLIFY_APP_ID }} \
              --branch-name ${{ secrets.AMPLIFY_BRANCH }} \
              --job-id $STUCK_JOB
            sleep 10
          fi

      - name: Deploy to Amplify
        run: |
          set -e
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name ${{ secrets.AMPLIFY_BRANCH }})

          echo "Deployment response: $DEPLOYMENT"

          JOB_ID=$(echo $DEPLOYMENT | jq -r '.jobId')
          ZIP_URL=$(echo $DEPLOYMENT | jq -r '.zipUploadUrl')

          echo "Uploading zip for job $JOB_ID"
          curl -f -X PUT \
            -H "Content-Type: application/zip" \
            --data-binary @build.zip \
            "$ZIP_URL"

          echo "Starting deployment"
          aws amplify start-deployment \
            --app-id ${{ secrets.AMPLIFY_APP_ID }} \
            --branch-name ${{ secrets.AMPLIFY_BRANCH }} \
            --job-id $JOB_ID

          echo "Deployment started successfully"
